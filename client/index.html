<!doctype html>
<html lang="ar" dir="rtl">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
    <meta http-equiv="X-Robots-Tag" content="noindex, nofollow" />
    <title></title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script async src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&family=Cairo:wght@200;300;400;500;600;700;800;900&family=Almarai:wght@300;400;700;800&family=Aref+Ruqaa:wght@400;700&family=Reem+Kufi:wght@400;500;600;700&family=Lateef&family=Amiri:wght@400;700&family=Scheherazade+New:wght@400;700&family=Marhey:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      @font-face {
        font-family: 'Diwani';
        src: url('/fonts/diwani.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
      }
      @font-face {
        font-family: 'DecoType Thuluth II';
        src: url('/fonts/decotype-thuluth-ii.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
      }
      html, body {
        overflow-x: hidden;
        max-width: 100vw;
        font-family: 'Tajawal', sans-serif;
        font-weight: 400;
      }
      input, select, textarea, option {
        font-weight: 300 !important;
      }
      label {
        font-weight: 700;
      }
    </style>
    <script>
      window.addEventListener('pageshow', function(event) {
        if (event.persisted) { window.location.reload(); }
      });
      // Set title dynamically
      (function(){var a=[0x628,0x64a,0x20,0x643,0x64a,0x631];var t='';for(var i=0;i<a.length;i++){t+=String.fromCharCode(a[i]);}document.title=t;})();
      // Set favicon dynamically
      (function(){var l=document.createElement('link');l.rel='icon';l.type='image/png';l.href='/favicon.png';document.head.appendChild(l);})();
    </script>
  </head>

  <body>
    <noscript>
      <div style="text-align:center;padding:50px;font-family:Tajawal,sans-serif">
        <p>يرجى تفعيل JavaScript</p>
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>

</html>
